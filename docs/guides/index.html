<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guides — LocalAI Lab</title>
<meta name="description" content="Browse all guides for self-hosted AI: Ollama, vLLM, Open WebUI, RAG, ComfyUI, and production LLM infrastructure.">
<link rel="stylesheet" href="/localai-lab/assets/style.css">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a href="/localai-lab/" class="logo">~/localai-lab</a>
    <nav class="nav">
      <a href="/localai-lab/guides/">Guides</a>
      <a href="/localai-lab/tools/">Tools</a>
      <a href="/localai-lab/newsletter/">Newsletter</a>
    </nav>
  </div>
</header>

<article class="guide-page">
  <div class="container">
    <div class="guide-header">
      <h1>All Guides</h1>
      <p style="color:var(--text-muted);font-size:1.1rem;margin-top:8px;">Comprehensive, tested guides for your self-hosted AI stack.</p>
    </div>

    <div class="guides-grid" id="guides-grid">
      <!-- Populated by JS from index.json -->
    </div>
  </div>
</article>

<footer class="footer">
  <div class="container footer-inner">
    <span>&copy; 2026 LocalAI Lab.</span>
    <div class="footer-links">
      <a href="/localai-lab/guides/">Guides</a>
      <a href="/localai-lab/newsletter/">Newsletter</a>
    </div>
  </div>
</footer>

<script>
fetch('/localai-lab/guides/index.json')
  .then(r => r.json())
  .then(guides => {
    const grid = document.getElementById('guides-grid');
    guides.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    guides.forEach(g => {
      const card = document.createElement('a');
      card.href = g.url;
      card.className = 'guide-card';
      card.innerHTML = `
        <span class="tag tag-${g.level || 'intermediate'}">${g.level || 'intermediate'}</span>
        <h3>${g.title}</h3>
        <p>${g.description || ''}</p>
        <div class="guide-meta">
          <span>${g.date || ''}</span>
          <span>${g.readTime || ''}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('guides-grid').innerHTML = '<p style="color:var(--text-muted)">Loading guides...</p>';
  });
</script>
</body>
</html>
